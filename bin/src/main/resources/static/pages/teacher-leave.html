<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AttendX — จัดการใบลา</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-text">Attend<span>X</span></div>
      </div>
      <div class="sidebar-section-label">เมนูอาจารย์</div>
      <nav class="sidebar-nav">
        <a href="teacher-dashboard.html">
          <span class="nav-icon">🏠</span> Dashboard
        </a>
        <a href="teacher-qr.html">
          <span class="nav-icon">📷</span> QR Generator
        </a>
        <a href="teacher-leave.html" class="active">
          <span class="nav-icon">📋</span> จัดการใบลา
          <span class="nav-badge" id="leaveNavBadge">3</span>
        </a>
        <a href="teacher-analytics.html">
          <span class="nav-icon">📊</span> Analytics
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="avatar" style="background:var(--dark-navy);color:var(--yellow);">อ</div>
        <div class="user-info">
          <div class="user-name">อาจารย์ (ด)</div>
          <div class="user-role">อาจารย์ประจำหลักสูตร CS</div>
        </div>
      </div>
    </aside>

    <!-- ── Topbar ── -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-icon-btn" onclick="toggleSidebar()">☰</button>
        <span class="page-title">จัดการใบลา</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-role-chip" style="background:var(--dark-navy);">อาจารย์</div>
        <div style="position:relative;">
          <div class="topbar-icon-btn" onclick="toggleNotif()">
            🔔 <span class="dot-badge">3</span>
          </div>
        </div>
        <div class="topbar-icon-btn" onclick="logout()">🚪</div>
      </div>
    </header>

    <!-- ── Main Content ── -->
    <main class="main-content">

      <div class="page-header">
        <h1>📋 จัดการใบลา</h1>
        <p class="subtitle">อนุมัติและปฏิเสธคำร้องขอลา</p>
      </div>

      <!-- Summary -->
      <div class="leave-summary-row" id="leaveSummaryRow"></div>

      <!-- Filter Tabs -->
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" onclick="filterLeave('pending')" id="tab-pending">⏳ รอดำเนินการ</button>
        <button class="btn btn-secondary btn-sm" onclick="filterLeave('approved')" id="tab-approved">✅ อนุมัติแล้ว</button>
        <button class="btn btn-secondary btn-sm" onclick="filterLeave('rejected')" id="tab-rejected">❌ ปฏิเสธแล้ว</button>
        <button class="btn btn-secondary btn-sm" onclick="filterLeave('all')" id="tab-all">ทั้งหมด</button>
      </div>

      <!-- Leave List -->
      <div class="leave-list" id="leaveList">
        <!-- populated by JS -->
      </div>

    </main>
  </div>

  <!-- Detail Modal (full reason + file) -->
  <div class="overlay hidden" id="detailModal">
    <div class="card" style="padding:28px;max-width:480px;width:100%;position:relative;">
      <button onclick="closeDetailModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);">✕</button>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <div style="font-size:36px;" id="detailModalIcon">📋</div>
        <div>
          <div style="font-size:16px;font-weight:700;" id="detailModalName">ชื่อนักเรียน</div>
          <div style="font-size:12px;color:var(--text-muted);" id="detailModalMeta">รายละเอียด</div>
        </div>
        <div style="margin-left:auto;" id="detailModalStatus"></div>
      </div>
      <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">📝 เหตุผลการลา</div>
      <div style="font-size:14px;line-height:1.6;padding:12px 16px;background:var(--bg-page);border-radius:10px;border:1px solid var(--border);" id="detailModalReason">-</div>
      <div id="detailModalFile"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;" id="detailModalActions"></div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="overlay hidden" id="confirmModal">
    <div class="card" style="padding:28px;max-width:400px;width:100%;text-align:center;">
      <div style="font-size:40px;margin-bottom:12px;" id="modalIcon">⚠️</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:8px;" id="modalTitle">ยืนยันการดำเนินการ</div>
      <div style="font-size:14px;color:var(--text-muted);margin-bottom:24px;" id="modalBody">คุณต้องการดำเนินการนี้ใช่ไหม?</div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary" onclick="confirmAction()" id="modalConfirmBtn">ยืนยัน</button>
      </div>
    </div>
  </div>

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../js/utils.js"></script>
  <script src="../js/teacher-leave.js"></script>
</body>
</html>
